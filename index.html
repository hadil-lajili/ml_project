<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Churn Prediction - MLOps</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        input, select {
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        .api-key-group {
            margin-bottom: 20px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:active { transform: translateY(0); }
        .result {
            margin-top: 24px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .result.rester {
            background: #e8f5e9;
            border: 2px solid #4caf50;
        }
        .result.partir {
            background: #ffebee;
            border: 2px solid #f44336;
        }
        .result-emoji { font-size: 40px; margin-bottom: 10px; }
        .result-text { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
        .result-prob { font-size: 14px; color: #666; }
        .loading {
            text-align: center;
            color: #667eea;
            margin-top: 16px;
            display: none;
        }
        .error {
            margin-top: 16px;
            padding: 12px;
            background: #ffebee;
            border-radius: 8px;
            color: #c62828;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏦 Churn Prediction</h1>
        <p class="subtitle">Prédisez si un client va quitter la banque</p>

        <div class="api-key-group">
            <div class="form-group">
                <label>🔐 Clé API</label>
                <input type="password" id="apiKey" value="mon_secret_mlops_2026" placeholder="Entrez votre clé API">
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Score de crédit</label>
                <input type="number" id="CreditScore" value="600" min="300" max="850">
            </div>
            <div class="form-group">
                <label>Pays</label>
                <select id="Geography">
                    <option value="0">France</option>
                    <option value="1">Germany</option>
                    <option value="2">Spain</option>
                </select>
            </div>
            <div class="form-group">
                <label>Genre</label>
                <select id="Gender">
                    <option value="0">Femme</option>
                    <option value="1">Homme</option>
                </select>
            </div>
            <div class="form-group">
                <label>Âge</label>
                <input type="number" id="Age" value="35" min="18" max="100">
            </div>
            <div class="form-group">
                <label>Ancienneté (années)</label>
                <input type="number" id="Tenure" value="5" min="0" max="10">
            </div>
            <div class="form-group">
                <label>Solde du compte</label>
                <input type="number" id="Balance" value="50000" min="0">
            </div>
            <div class="form-group">
                <label>Nombre de produits</label>
                <input type="number" id="NumOfProducts" value="2" min="1" max="4">
            </div>
            <div class="form-group">
                <label>Carte de crédit</label>
                <select id="HasCrCard">
                    <option value="1">Oui</option>
                    <option value="0">Non</option>
                </select>
            </div>
            <div class="form-group">
                <label>Membre actif</label>
                <select id="IsActiveMember">
                    <option value="1">Oui</option>
                    <option value="0">Non</option>
                </select>
            </div>
            <div class="form-group">
                <label>Salaire estimé</label>
                <input type="number" id="EstimatedSalary" value="50000" min="0">
            </div>
        </div>

        <button class="btn" onclick="predict()">🔮 Prédire</button>

        <div class="loading" id="loading">⏳ Analyse en cours...</div>
        <div class="error" id="error"></div>

        <div class="result" id="result">
            <div class="result-emoji" id="emoji"></div>
            <div class="result-text" id="resultText"></div>
            <div class="result-prob" id="resultProb"></div>
        </div>
    </div>

    <script>
        async function predict() {
            const apiKey = document.getElementById('apiKey').value;
            const data = {
                CreditScore: parseFloat(document.getElementById('CreditScore').value),
                Geography: parseInt(document.getElementById('Geography').value),
                Gender: parseInt(document.getElementById('Gender').value),
                Age: parseFloat(document.getElementById('Age').value),
                Tenure: parseFloat(document.getElementById('Tenure').value),
                Balance: parseFloat(document.getElementById('Balance').value),
                NumOfProducts: parseInt(document.getElementById('NumOfProducts').value),
                HasCrCard: parseInt(document.getElementById('HasCrCard').value),
                IsActiveMember: parseInt(document.getElementById('IsActiveMember').value),
                EstimatedSalary: parseFloat(document.getElementById('EstimatedSalary').value)
            };

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            document.getElementById('error').style.display = 'none';

            try {
                const response = await fetch('http://127.0.0.1:8000/predict', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': apiKey
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                document.getElementById('loading').style.display = 'none';

                if (response.ok) {
                    const resultDiv = document.getElementById('result');
                    const emoji = document.getElementById('emoji');
                    const resultText = document.getElementById('resultText');
                    const resultProb = document.getElementById('resultProb');

                    if (result.prediction === 0) {
                        resultDiv.className = 'result rester';
                        emoji.textContent = '✅';
                        resultText.textContent = 'Ce client va RESTER';
                        resultText.style.color = '#2e7d32';
                    } else {
                        resultDiv.className = 'result partir';
                        emoji.textContent = '⚠️';
                        resultText.textContent = 'Ce client va QUITTER la banque';
                        resultText.style.color = '#c62828';
                    }
                    resultProb.textContent = `Probabilité de départ : ${result.probabilite_de_depart}%`;
                    resultDiv.style.display = 'block';
                } else {
                    showError(result.detail || 'Erreur API');
                }
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                showError('Impossible de contacter l API. Vérifiez que FastAPI tourne sur le port 8000.');
            }
        }

        function showError(msg) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = msg;
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
